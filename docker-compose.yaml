services:
  pg:
    image: postgres:18.1-alpine
    environment:
      PGDATA: /var/lib/postgresql/18/docker
      POSTGRES_DB: $PG_DB
      POSTGRES_USER: $PG_USER
      POSTGRES_PASSWORD: $PG_PASSWORD
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
      - ./pg-init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
volumes:
  pgdata:
